const vt = () => VOICE_TR[lang];

/* ═══════════════════════════════════════════════
   NLP PARSER
   ═══════════════════════════════════════════════ */
function parseVoice(text) {
  const lower = text.toLowerCase().trim();
  const result = { date: new Date(), type: 'morning', start: '09:00', end: '18:00', place: '', notes: '', raw: text, confidence: 1 };
  let remaining = lower;

  /* ── DATE PARSING ── */
  const HE_DAY_NAMES = ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
  const EN_DAY_NAMES = ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
  const HE_MONTH_NAMES = ['ינואר','פברואר','מרץ','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];

  // Hebrew relative
  if (/היום/.test(lower)) { result.date = new Date(); }
  else if (/מחר/.test(lower)) { result.date = new Date(today); result.date.setDate(today.getDate()+1); }
  else if (/אתמול/.test(lower)) { result.date = new Date(today); result.date.setDate(today.getDate()-1); }
  // English relative
  else if (/\btoday\b/.test(lower)) { result.date = new Date(); }
  else if (/\btomorrow\b/.test(lower)) { result.date = new Date(today); result.date.setDate(today.getDate()+1); }
  else if (/\byesterday\b/.test(lower)) { result.date = new Date(today); result.date.setDate(today.getDate()-1); }
  else {
    // Hebrew day name e.g. "ביום שלישי", "שלישי"
    let found = false;
    for (let i = 0; i < HE_DAY_NAMES.length; i++) {
      if (lower.includes(HE_DAY_NAMES[i])) {
        result.date = nextWeekday(i); found = true; break;
      }
    }
    if (!found) {
      // English day name
      for (let i = 0; i < EN_DAY_NAMES.length; i++) {
        if (new RegExp('\\b'+EN_DAY_NAMES[i]+'\\b').test(lower)) {
          result.date = nextWeekday(i); found = true; break;
        }
      }
    }
    if (!found) {
      // numeric date: "24 לאפריל", "24.4", "ה-24", "24/4", "24 ב-4"
      const numDate = lower.match(/(\d{1,2})[.\-\/](\d{1,2})/) ||
                      lower.match(/(\d{1,2})\s+ל(\w+)/) ||
                      lower.match(/ה-(\d{1,2})/);
      if (numDate) {
        let day = parseInt(numDate[1]);
        let month = null;
        if (numDate[2]) {
          // could be number or Hebrew month name
          const raw2 = numDate[2].trim();
          const mNum = parseInt(raw2);
          if (!isNaN(mNum)) {
            month = mNum - 1;
          } else {
            for (let i = 0; i < HE_MONTH_NAMES.length; i++) {
              if (raw2.includes(HE_MONTH_NAMES[i])) { month = i; break; }
            }
          }
        }
        if (month === null) month = today.getMonth();
        const candidate = new Date(today.getFullYear(), month, day);
        if (!isNaN(candidate)) result.date = candidate;
      } else {
        result.confidence = Math.max(0.5, result.confidence - 0.2);
      }
    }
  }
  result.date.setHours(0,0,0,0);

  /* ── SHIFT TYPE PARSING ── */
  const typeMatches = {
    // Hebrew — ordered by specificity (longer phrases first)
    morning:   [/משמרת בוקר/,/בוקר/,/morning/],
    afternoon: [/משמרת צהריים/,/צהריים/,/afternoon/],
    evening:   [/משמרת ערב/,/\bערב\b/,/evening/],
    night:     [/משמרת לילה/,/לילה/,/\bnight\b/],
    double:    [/משמרת כפולה/,/כפולה/,/כפול/,/double/],
    standby:   [/כוננות/,/standby/,/on.?call/],
    vacation:  [/חופשה/,/vacation/,/\boff\b.*\bday\b/,/\bday\b.*\boff\b/],
    dayoff:    [/יום חופש/,/חופש/,/day off/,/dayoff/],
    sick:      [/מחלה/,/חולה/,/sick/],
    other:     [/אחר/,/other/],
  };
  let typeFound = false;
  // Check in order: double > sick > vacation > dayoff > standby > night > evening > afternoon > morning > other
  const checkOrder = ['double','sick','vacation','dayoff','standby','night','evening','afternoon','morning','other'];
  for (const typeId of checkOrder) {
    if (typeMatches[typeId].some(rx => rx.test(lower))) {
      result.type = typeId;
      typeFound = true;
      break;
    }
  }
  if (!typeFound) result.confidence = Math.max(0.4, result.confidence - 0.3);

  /* ── TIME PARSING ── */
  // Strategy: find start and end times from various phrase patterns
  // Patterns: "מ-9", "מ 9", "מהשעה 9", "from 9", "9am", "9:30" etc.

  const normalizeHour = (str) => {
    // Convert spoken/typed time to HH:MM
    str = str.trim();
    // Hebrew word numbers
    const heNum = {
      'אחת':1,'שתיים':2,'שלוש':3,'ארבע':4,'חמש':5,'שש':6,
      'שבע':7,'שמונה':8,'תשע':9,'עשר':10,'אחת עשרה':11,'אחת-עשרה':11,
      'שתים עשרה':12,'שתים-עשרה':12,'חצות':0
    };
    for (const [word, num] of Object.entries(heNum)) {
      if (str.includes(word)) return `${pad(num)}:00`;
    }
    // numeric with colon: "9:30", "09:30"
    const colonMatch = str.match(/^(\d{1,2}):(\d{2})$/);
    if (colonMatch) return `${pad(parseInt(colonMatch[1]))}:${colonMatch[2]}`;
    // plain number: "9", "17"
    const numMatch = str.match(/^(\d{1,2})$/);
    if (numMatch) {
      let h = parseInt(numMatch[1]);
      // pm inference: if < 8 assume pm for end times (heuristic)
      return `${pad(h)}:00`;
    }
    // pm/am: "5pm", "9am"
    const ampm = str.match(/^(\d{1,2})(am|pm)$/i);
    if (ampm) {
      let h = parseInt(ampm[1]);
      if (ampm[2].toLowerCase() === 'pm' && h < 12) h += 12;
      if (ampm[2].toLowerCase() === 'am' && h === 12) h = 0;
      return `${pad(h)}:00`;
    }
    return null;
  };

  // Extract time ranges from text
  // Pattern 1: "מ-X עד Y" / "from X to Y" / "X to Y" / "X until Y"
  const rangePatterns = [
    /מ-?(\S+(?:\s\S+)?)\s+עד\s+(\S+(?:\s\S+)?)/,          // Hebrew: מ-X עד Y
    /משעה\s+(\S+)\s+עד\s+(\S+)/,                           // משעה X עד Y
    /מהשעה\s+(\S+)\s+עד\s+(\S+)/,                          // מהשעה X עד Y
    /from\s+(\S+)\s+to\s+(\S+)/i,                          // from X to Y
    /(\d{1,2}(?::\d{2})?(?:am|pm)?)\s+to\s+(\d{1,2}(?::\d{2})?(?:am|pm)?)/i, // X to Y
    /(\d{1,2}(?::\d{2})?)\s*[-–]\s*(\d{1,2}(?::\d{2})?)/,  // X-Y or X–Y
    /(\d{1,2}(?::\d{2})?(?:am|pm)?)\s+until\s+(\d{1,2}(?::\d{2})?(?:am|pm)?)/i,
  ];

  let timesFound = false;
  for (const rx of rangePatterns) {
    const m = lower.match(rx);
    if (m) {
      const s = normalizeHour(m[1]);
      const e = normalizeHour(m[2]);
      if (s && e) { result.start = s; result.end = e; timesFound = true; break; }
    }
  }

  // Pattern 2: single start time only "מ-9" / "from 9" / "starting 9"
  if (!timesFound) {
    const startOnly = lower.match(/(?:מ-|מ |מהשעה |משעה |from |starting at |starting )(\d{1,2}(?::\d{2})?(?:am|pm)?)/i);
    if (startOnly) {
      const s = normalizeHour(startOnly[1]);
      if (s) { result.start = s; timesFound = true; }
    }
    const endOnly = lower.match(/(?:עד |until )(\d{1,2}(?::\d{2})?(?:am|pm)?)/i);
    if (endOnly) {
      const e = normalizeHour(endOnly[1]);
      if (e) { result.end = e; timesFound = true; }
    }
  }

  // For no-time types, clear times
  if (NO_TIMES.has(result.type)) {
    result.start = '';
    result.end = '';
  } else if (!timesFound) {
    // Apply smart defaults per shift type
    const defaults = {
      morning:   ['08:00','16:00'],
      afternoon: ['12:00','20:00'],
      evening:   ['16:00','23:00'],
      night:     ['22:00','06:00'],
      double:    ['08:00','22:00'],
      standby:   ['08:00','17:00'],
    };
    if (defaults[result.type]) {
      [result.start, result.end] = defaults[result.type];
    }
    result.confidence = Math.max(0.5, result.confidence - 0.15);
  }

  /* ── SMART PM INFERENCE ── */
  // If end hour < start hour and not overnight-intended (e.g. "9 to 5" should be "09:00 to 17:00")
  // BUT skip for night shifts (those are legitimately overnight: "23 to 7")
  if (result.start && result.end && !NO_TIMES.has(result.type) && result.type !== 'night') {
    const [sh] = result.start.split(':').map(Number);
    const [eh] = result.end.split(':').map(Number);
    // Only adjust if start is clearly daytime (≥7) and end is early-morning-ish (<8)
    // This catches "9 to 5" but not "22 to 6" or other overnight patterns
    if (eh < sh && eh < 8 && sh >= 7 && sh < 18) {
      // add 12 to end: "5" → "17:00"
      const adjusted = `${pad(eh + 12)}:${result.end.split(':')[1]}`;
      result.end = adjusted;
    }
  }

  /* ── PLACE + NOTES: split leftover text intelligently ── */
  // The user's typical pattern is: "[place name] [time range]"
  // Strategy: text BEFORE the first time keyword in the original (lowercased) string
  // becomes the place. Anything after is checked for explicit "note:" / "הערה:" markers.
  // If neither pattern hits, the whole leftover becomes the place.

  // Find earliest time-keyword position in the original string
  const timeKeywordRx = /(?:מ-?\s*\d|משעה\s+|מהשעה\s+|\bfrom\s+\d|\bstarting(?:\s+at)?\s+\d|\bעד\s+\d|\buntil\s+\d|\d{1,2}\s*[:.]\s*\d{2}|\d{1,2}\s*[-–]\s*\d{1,2}|\bto\s+\d|\d{1,2}\s*(?:am|pm)\b)/i;
  const timeMatch = lower.match(timeKeywordRx);
  const cutPoint = timeMatch ? lower.indexOf(timeMatch[0]) : -1;

  let beforeTime = cutPoint >= 0 ? lower.slice(0, cutPoint) : lower;
  let afterTime  = cutPoint >= 0 ? lower.slice(cutPoint) : '';

  // Strip date words, type words, and stray time tokens from the BEFORE part
  const stripWords = (txt) => {
    ['היום','מחר','אתמול','today','tomorrow','yesterday',
      ...HE_DAY_NAMES, ...EN_DAY_NAMES,
      'משמרת בוקר','משמרת צהריים','משמרת ערב','משמרת לילה','משמרת כפולה','משמרת',
      'בוקר','צהריים','ערב','לילה','כפולה','כפול','כוננות','חופשה','יום חופש','חופש','מחלה','חולה','אחר',
      'morning','afternoon','evening','night','double','standby','vacation','day off','dayoff','sick','other',
      'shifts','shift','ביום','של יום','ב-','ב ','ל-'
    ].forEach(w => { txt = txt.replace(new RegExp(w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'), ''); });
    txt = txt.replace(/\d{1,2}[.\-\/]\d{1,2}/g, '');
    txt = txt.replace(/[״"׳']/g, '');
    txt = txt.replace(/[,;:]/g, ' ');
    txt = txt.replace(/^\s*(?:ב|של|את|in|at|the)\s+/i, '');
    txt = txt.replace(/\s{2,}/g, ' ').trim();
    return txt;
  };

  let placeText = stripWords(beforeTime);

  // Look for explicit notes marker in the AFTER part: "הערה:" / "note:" / "(...)"
  let notesText = '';
  const noteRx = /(?:הערה[:\s]|note[:\s]|notes[:\s])(.+)$/i;
  const noteM = afterTime.match(noteRx) || lower.match(noteRx);
  if (noteM && noteM[1]) {
    notesText = noteM[1].trim();
    // remove trailing punctuation
    notesText = notesText.replace(/[.!?]+$/, '').trim();
  }

  // If no place was found before time keywords, scan remaining text for a place
  if (!placeText && cutPoint >= 0) {
    // strip time expressions from after-portion and use anything left
    let scrap = afterTime
      .replace(/(?:מ-?|משעה |מהשעה |from |starting at |starting |עד |until )\s*\d{1,2}(?::\d{2})?(?:am|pm)?/gi, '')
      .replace(/\d{1,2}(?::\d{2})?(?:am|pm)?\s*[-–]\s*\d{1,2}(?::\d{2})?(?:am|pm)?/gi, '')
      .replace(/\d{1,2}\s*to\s*\d{1,2}(?::\d{2})?(?:am|pm)?/gi, '')
      .replace(/\d{1,2}(?::\d{2})?(?:am|pm)?/gi, '');
    if (noteM) scrap = scrap.replace(noteRx, '');
    placeText = stripWords(scrap);
  }

  // Title-case (first letter uppercase) for English place names; leave Hebrew as-is
  if (placeText) {
    // Capitalize first letter of each meaningful word (English only)
    placeText = placeText.replace(/\b([a-z])/g, c => c.toUpperCase());
  }

  if (placeText && placeText.length >= 2) result.place = placeText.slice(0, 60);
  else result.place = '';

  if (notesText && notesText.length >= 2) result.notes = notesText.slice(0, 200);
  else result.notes = '';

  return result;
}

function nextWeekday(targetDay) {
  const d = new Date(today);
  const cur = d.getDay();
  let diff = targetDay - cur;
  if (diff <= 0) diff += 7;
  d.setDate(d.getDate() + diff);
  return d;
}

/* ═══════════════════════════════════════════════
   WAVEFORM VISUALIZER
   ═══════════════════════════════════════════════ */
function startWaveform(stream) {
  try {
    voiceAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
    voiceAnalyser = voiceAudioCtx.createAnalyser();
    voiceAnalyser.fftSize = 64;
    voiceAnalyser.smoothingTimeConstant = 0.82;
    const src = voiceAudioCtx.createMediaStreamSource(stream);
    src.connect(voiceAnalyser);
    drawWave();
  } catch(e) { drawIdleWave(); }
}

function drawWave() {
  const canvas = document.getElementById('voice-wave');
  if (!canvas || !voiceAnalyser) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const bins = new Uint8Array(voiceAnalyser.frequencyBinCount);

  const accent = themeMode === 'dark' ? '#E0A166' : '#B8763C';
  const bg     = themeMode === 'dark' ? '#1A1610' : '#FBF8F1';
  const barCount = 28;
  const barW = 5, gap = (W - barCount * barW) / (barCount + 1);

  function frame() {
    if (!voiceIsRecording) { stopWaveform(); return; }
    voiceAnalyser.getByteFrequencyData(bins);
    ctx.clearRect(0, 0, W, H);

    for (let i = 0; i < barCount; i++) {
      const binIdx = Math.floor(i / barCount * bins.length * 0.6);
      const raw = bins[binIdx] / 255;
      const minH = 4, maxH = H * 0.85;
      const barH = minH + raw * (maxH - minH);
      const x = gap + i * (barW + gap);
      const y = (H - barH) / 2;

      const alpha = 0.35 + raw * 0.65;
      ctx.fillStyle = accent + Math.round(alpha * 255).toString(16).padStart(2,'0');
      roundRect(ctx, x, y, barW, barH, barW / 2);
      ctx.fill();
    }
    voiceAnimFrame = requestAnimationFrame(frame);
  }
  frame();
}

function drawIdleWave() {
  const canvas = document.getElementById('voice-wave');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const accent = themeMode === 'dark' ? '#E0A166' : '#B8763C';
  const barCount = 28, barW = 5, gap = (W - barCount * barW) / (barCount + 1);
  let t = 0;
  function frame() {
    if (!voiceIsRecording) { stopWaveform(); return; }
    ctx.clearRect(0, 0, W, H);
    t += 0.08;
    for (let i = 0; i < barCount; i++) {
      const wave = 0.15 + 0.13 * Math.sin(t + i * 0.5);
      const barH = 4 + wave * (H * 0.85 - 4);
      const x = gap + i * (barW + gap);
      const y = (H - barH) / 2;
      ctx.fillStyle = accent + '70';
      roundRect(ctx, x, y, barW, barH, barW / 2);
      ctx.fill();
    }
    voiceAnimFrame = requestAnimationFrame(frame);
  }
  frame();
}

function stopWaveform() {
  if (voiceAnimFrame) { cancelAnimationFrame(voiceAnimFrame); voiceAnimFrame = null; }
  if (voiceAudioCtx) { try { voiceAudioCtx.close(); } catch(e){} voiceAudioCtx = null; }
  voiceAnalyser = null;
  const canvas = document.getElementById('voice-wave');
  if (canvas) canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

/* ═══════════════════════════════════════════════
   RECORDING CONTROL
   ═══════════════════════════════════════════════ */
function startRecording() {
  const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRec) {
    const el = document.getElementById('voice-no-support');
    el.textContent = vt().noSupport;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 3500);
    return;
  }

  voiceIsRecording = true;
  voiceTranscript  = '';

  // UI
  document.getElementById('mic-fab').classList.add('recording');
  const panel   = document.getElementById('voice-panel');
  panel.classList.add('show');
  const statusEl = document.getElementById('voice-status');
  statusEl.textContent = vt().listening;
  statusEl.className   = 'voice-status active';
  const txEl = document.getElementById('voice-transcript');
  txEl.textContent = vt().tapToSpeak;
  txEl.className   = 'placeholder';

  // Always use idle waveform — do NOT call getUserMedia here.
  // On Android Chrome, getUserMedia and SpeechRecognition both grab the mic
  // and whichever gets it second fails silently. SpeechRecognition must win.
  drawIdleWave();

  /* ── CLOSURE STATE ─────────────────────────────── */
  let finalTranscript = '';   // accumulates confirmed words
  let restarts        = 0;
  const MAX_RESTARTS  = 8;    // mobile browsers stop every ~5s — we restart silently
  let finalized       = false;

  /* ── FINALIZE: process transcript & show confirm ── */
  function finalize() {
    if (finalized) return;
    finalized = true;
    statusEl.textContent = vt().processing;
    statusEl.className   = 'voice-status done';
    stopWaveform();
    if (voiceStream) { voiceStream.getTracks().forEach(t => t.stop()); voiceStream = null; }
    setTimeout(() => {
      _clearRecordingUI();
      const text = voiceTranscript.trim();
      if (text.length < 2) { showToast(vt().nothing, 'warn'); return; }
      voiceParsed = parseVoice(text);
      showVoiceConfirm(voiceParsed);
    }, 350);
  }

  /* ── BUILD RECOGNIZER (re-used on each restart) ── */
  function buildRec() {
    const rec = new SpeechRec();
    rec.continuous      = true;   // KEY: keep listening on mobile
    rec.interimResults  = true;
    rec.maxAlternatives = 1;      // more compatible across mobile browsers
    rec.lang = lang === 'he' ? 'he-IL' : 'en-US';

    /* Confirm recognition actually started on device */
    rec.onstart = () => {
      statusEl.textContent = vt().listening;
      statusEl.className   = 'voice-status active';
    };

    /* Accumulate results correctly — NEVER overwrite finalTranscript */
    rec.onresult = (e) => {
      let interim = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const txt = e.results[i][0].transcript;
        if (e.results[i].isFinal) finalTranscript += txt + ' ';
        else interim += txt;
      }
      voiceTranscript = (finalTranscript + interim).trim();
      txEl.textContent = voiceTranscript || vt().tapToSpeak;
      txEl.className   = voiceTranscript ? 'has-text' : 'placeholder';
    };

    /* onend fires when: (a) user tapped stop → voiceIsRecording=false → finalize
                         (b) mobile timeout   → voiceIsRecording=true  → restart */
    rec.onend = () => {
      if (!voiceIsRecording) { finalize(); return; }
      // Mobile killed the session — restart transparently
      if (restarts < MAX_RESTARTS) {
        restarts++;
        setTimeout(() => {
          if (!voiceIsRecording) return;
          voiceRecognition = buildRec();
          try { voiceRecognition.start(); } catch(err) { finalize(); }
        }, 150);
      } else {
        finalize(); // gave up restarting — process what we have
      }
    };

    rec.onerror = (e) => {
      if (e.error === 'aborted') return; // we stopped it — ignore
      // 'no-speech' and 'network' are transient on mobile — restart
      if ((e.error === 'no-speech' || e.error === 'network') && voiceIsRecording && restarts < MAX_RESTARTS) {
        restarts++;
        setTimeout(() => {
          if (!voiceIsRecording) return;
          voiceRecognition = buildRec();
          try { voiceRecognition.start(); } catch(err) {}
        }, 200);
        return;
      }
      // Hard errors
      voiceIsRecording = false;
      const msgMap = { 'not-allowed': vt().noMic };
      _clearRecordingUI();
      if (e.error !== 'no-speech') showToast(msgMap[e.error] || `Error: ${e.error}`, 'warn');
    };

    return rec;
  }

  voiceRecognition = buildRec();
  try { voiceRecognition.start(); } catch(e) { _clearRecordingUI(); }
}

/* Called by mic-FAB (stop & process) — sets flag, stops recognizer,
   onend fires → finalize() runs automatically                        */
function stopRecording() {
  if (!voiceIsRecording && !voiceRecognition) return;
  voiceIsRecording = false;
  if (voiceRecognition) { try { voiceRecognition.stop(); } catch(e){} voiceRecognition = null; }
  // UI cleaned up inside finalize() → _clearRecordingUI()
}

/* Hard cancel — no processing */
function cancelRecording() {
  voiceIsRecording = false;
  if (voiceRecognition) { try { voiceRecognition.stop(); } catch(e){} voiceRecognition = null; }
  stopWaveform();
  _clearRecordingUI();
}

function _clearRecordingUI() {
  voiceIsRecording = false;
  document.getElementById('mic-fab').classList.remove('recording');
  document.getElementById('voice-panel').classList.remove('show');
  const statusEl = document.getElementById('voice-status');
  statusEl.textContent = '';
  statusEl.className   = 'voice-status';
}

/* ═══════════════════════════════════════════════
   VOICE CONFIRM SHEET
   ═══════════════════════════════════════════════ */
function showVoiceConfirm(parsed) {
  const tr = vt();
  const st = getShiftType(parsed.type);
  const dn = dayNames()[parsed.date.getDay()];
  const mName = monthNames()[parsed.date.getMonth()];

  // populate
  document.getElementById('vc-title').textContent = tr.confirmTitle;
  document.getElementById('vc-transcript-box').textContent = `"${parsed.raw}"`;
  document.getElementById('vc-date-label').textContent = tr.dateLabel;
  document.getElementById('vc-date-value').textContent = `${dn} · ${shortDate(parsed.date)} ${mName}`;
  document.getElementById('vc-date-edit').textContent = tr.changeDate;

  const typeDot  = document.getElementById('vc-type-dot');
  const typeName = document.getElementById('vc-type-name');
  const typeTimes= document.getElementById('vc-type-times');
  typeDot.style.background = st.color;
  typeName.textContent = isHe() ? st.he : st.en;
  typeName.style.color = st.color;
  if (parsed.start && parsed.end) {
    const h = shiftDuration(parsed.start, parsed.end);
    typeTimes.textContent = `${parsed.start}–${parsed.end}${h ? ` · ${h}${isHe() ? ' ש׳' : 'h'}` : ''}`;
  } else {
    typeTimes.textContent = '';
  }

  // place row
  const placeRow  = document.getElementById('vc-place-row');
  const placeName = document.getElementById('vc-place-name');
  if (parsed.place) {
    placeName.textContent = parsed.place;
    placeRow.style.display = '';
  } else {
    placeRow.style.display = 'none';
  }

  const notesRow = document.getElementById('vc-notes-row');
  if (parsed.notes) {
    notesRow.textContent = parsed.notes;
    notesRow.style.display = '';
  } else {
    notesRow.style.display = 'none';
  }

  const warn = document.getElementById('vc-warn');
  if (parsed.confidence < 0.75) {
    warn.textContent = tr.partialWarn;
    warn.style.display = '';
  } else {
    warn.style.display = 'none';
  }

  document.getElementById('vc-lbl-confirm').textContent = tr.confirm;
  document.getElementById('vc-btn-edit').textContent = tr.editManually;
  document.getElementById('vc-btn-discard').textContent = tr.discard;

  openSheet('sheet-voice-confirm');
}

function saveVoiceParsed() {
  if (!voiceParsed) return;
  const key = dateKey(voiceParsed.date);
  shifts[key] = {
    type:    voiceParsed.type,
    place:   voiceParsed.place || '',
    start:   voiceParsed.start,
    end:     voiceParsed.end,
    notes:   voiceParsed.notes,
    savedAt: new Date().toISOString(),
  };
  save();
  closeSheet('sheet-voice-confirm');

  // Jump the list to show the saved day's month
  viewYear  = voiceParsed.date.getFullYear();
  viewMonth = voiceParsed.date.getMonth();
  renderAll();

  // Scroll to the saved row
  setTimeout(() => {
    const row = document.querySelector(`[data-key="${dateKey(voiceParsed.date)}"]`);
    if (row) row.scrollIntoView({block:'center', behavior:'smooth'});
  }, 200);

  const st = getShiftType(voiceParsed.type);
  const label = voiceParsed.place || (isHe() ? st.he : st.en);
  showToast(`${label} · ${shortDate(voiceParsed.date)} ✓`, 'ok');
  voiceParsed = null;
}

function wireVoice() {
  // Mic FAB: tap = start · tap again = stop & process
  document.getElementById('mic-fab').addEventListener('click', () => {
    if (voiceIsRecording) stopRecording();
    else startRecording();
  });

  // Cancel button = hard cancel, no processing
  const cancelBtn = document.getElementById('voice-cancel-btn');
  cancelBtn.textContent = vt().cancel;
  cancelBtn.addEventListener('click', cancelRecording);

  // Confirm sheet actions
  document.getElementById('vc-btn-confirm').addEventListener('click', saveVoiceParsed);

  document.getElementById('vc-btn-edit').addEventListener('click', () => {
    if (!voiceParsed) return;
    closeSheet('sheet-voice-confirm');
    // Jump to correct month then open edit sheet pre-filled
    viewYear  = voiceParsed.date.getFullYear();
    viewMonth = voiceParsed.date.getMonth();
    renderAll();
    // Pre-fill with parsed data before opening the edit sheet
    const tmpDate = voiceParsed.date;
    const tmpKey = dateKey(tmpDate);
    // temporarily put parsed data into shifts so edit sheet sees it as "existing"
    shifts[tmpKey] = {
      type:  voiceParsed.type,
      place: voiceParsed.place || '',
      start: voiceParsed.start,
      end:   voiceParsed.end,
      notes: voiceParsed.notes,
    };
    renderDayList();
    setTimeout(() => openEditSheet(tmpDate), 120);
    voiceParsed = null;
  });

  document.getElementById('vc-btn-discard').addEventListener('click', () => {
    closeSheet('sheet-voice-confirm');
    voiceParsed = null;
  });

  document.getElementById('vc-date-edit').addEventListener('click', () => {
    closeSheet('sheet-voice-confirm');
    // open the full edit sheet so user can pick a different date
    if (voiceParsed) {
      viewYear  = voiceParsed.date.getFullYear();
      viewMonth = voiceParsed.date.getMonth();
      renderAll();
      setTimeout(() => openEditSheet(voiceParsed.date), 120);
    }
  });
}

/* ═══════════════════════════════════════════════
   PWA — INLINE MANIFEST + SERVICE WORKER + ICON
   Self-contained: no external files needed.
   Works on HTTPS for Android (install prompt)
   and iOS (Add to Home Screen via Safari).
   ═══════════════════════════════════════════════ */

function generateAppIcon(size) {
  const cv = document.createElement('canvas');
  cv.width = cv.height = size;
  const ctx = cv.getContext('2d');
  // Rounded square clip
  const r = size * 0.22;
  ctx.beginPath();
  ctx.moveTo(r,0); ctx.lineTo(size-r,0);
  ctx.arcTo(size,0,size,r,r); ctx.lineTo(size,size-r);
  ctx.arcTo(size,size,size-r,size,r); ctx.lineTo(r,size);
  ctx.arcTo(0,size,0,size-r,r); ctx.lineTo(0,r);
  ctx.arcTo(0,0,r,0,r); ctx.closePath();
  // Warm caramel gradient
  const g = ctx.createLinearGradient(0,0,size,size);
  g.addColorStop(0,'#C8864C'); g.addColorStop(1,'#A56830');
  ctx.fillStyle = g; ctx.fill();
  // Shine
  ctx.save(); ctx.clip();
  const sh = ctx.createRadialGradient(size*.5,size*.08,0,size*.5,size*.5,size*.72);
  sh.addColorStop(0,'rgba(255,255,255,.2)'); sh.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle = sh; ctx.fillRect(0,0,size,size);
  ctx.restore();
  // Letter מ
  ctx.fillStyle = 'rgba(255,255,255,.96)';
  ctx.font = '700 '+Math.round(size*.56)+'px Georgia,"Times New Roman",serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('מ', size/2, size/2 + size*.04);
  return cv.toDataURL('image/png');
}

/* ═══════════════════════════════════════════════
   PWA — MANIFEST · SERVICE WORKER · INSTALL PROMPT
   ═══════════════════════════════════════════════ */
let deferredInstallPrompt = null;

function buildAppIconSVG() {
  return [
    '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">',
    '<rect width="512" height="512" rx="108" fill="#B8763C"/>',
    '<rect x="88" y="168" width="336" height="272" rx="28" fill="rgba(255,255,255,.13)" stroke="rgba(255,255,255,.65)" stroke-width="14"/>',
    '<line x1="88" y1="244" x2="424" y2="244" stroke="rgba(255,255,255,.6)" stroke-width="12"/>',
    '<rect x="174" y="88" width="30" height="96" rx="15" fill="white"/>',
    '<rect x="308" y="88" width="30" height="96" rx="15" fill="white"/>',
    '<rect x="148" y="284" width="48" height="48" rx="10" fill="white" opacity=".88"/>',
    '<rect x="232" y="284" width="48" height="48" rx="10" fill="white" opacity=".88"/>',
    '<rect x="316" y="284" width="48" height="48" rx="10" fill="white" opacity=".32"/>',
    '<rect x="148" y="356" width="48" height="48" rx="10" fill="white" opacity=".88"/>',
    '<rect x="232" y="356" width="48" height="48" rx="10" fill="white" opacity=".32"/>',
    '<rect x="316" y="356" width="48" height="48" rx="10" fill="white" opacity=".32"/>',
    '</svg>',
  ].join('');
}

function injectPWA() {
  // 1. Generate canvas PNG icons (better Android Chrome compatibility than SVG)
  const icon192 = generateAppIcon(192);
  const icon512 = generateAppIcon(512);

  // Set Apple touch icon from canvas PNG
  let atl = document.querySelector('link[rel="apple-touch-icon"]');
  if (!atl) { atl = document.createElement('link'); atl.rel = 'apple-touch-icon'; document.head.appendChild(atl); }
  atl.href = icon192;

  // 2. Build manifest with both PNG and SVG icons
  const svgStr  = buildAppIconSVG();
  const iconSVG = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svgStr)));
  const mf = JSON.stringify({
    name: isHe() ? 'יומן משמרות' : 'Shift Log',
    short_name: isHe() ? 'משמרות' : 'Shifts',
    description: isHe() ? 'מעקב משמרות אישי ופרטי' : 'Private offline shift tracker',
    start_url: '.', scope: '.',
    display: 'standalone', orientation: 'portrait-primary',
    background_color: '#F7F4EE', theme_color: '#B8763C',
    lang, dir: isHe() ? 'rtl' : 'ltr',
    icons: [
      { src: icon192, sizes: '192x192', type: 'image/png', purpose: 'any' },
      { src: icon512, sizes: '512x512', type: 'image/png', purpose: 'any' },
      { src: icon192, sizes: '192x192', type: 'image/png', purpose: 'maskable' },
      { src: iconSVG, sizes: 'any',     type: 'image/svg+xml', purpose: 'any' },
    ],
  });
  document.querySelectorAll('link[rel="manifest"]').forEach(l => l.remove());
  const mfLink = document.createElement('link');
  mfLink.rel  = 'manifest';
  mfLink.href = 'data:application/manifest+json;charset=utf-8,' + encodeURIComponent(mf);
  document.head.appendChild(mfLink);

  // 3. Register Service Worker via Blob URL (works when served over HTTPS)
  if ('serviceWorker' in navigator) {
    const swSrc = [
      "const CACHE='shifts-sw-v2';",
      "self.addEventListener('install',()=>self.skipWaiting());",
      "self.addEventListener('activate',e=>e.waitUntil(clients.claim()));",
      "self.addEventListener('fetch',e=>{",
      "  if(e.request.method!=='GET')return;",
      "  e.respondWith(",
      "    caches.open(CACHE).then(c=>",
      "      c.match(e.request).then(r=>r||fetch(e.request).then(res=>{",
      "        if(res.ok)c.put(e.request,res.clone());return res;",
      "      }).catch(()=>r||new Response('Offline',{status:503})))",
      "    )",
      "  );",
      "});",
    ].join('\n');
    try {
      const swBlob = new Blob([swSrc], { type: 'text/javascript' });
      const swURL  = URL.createObjectURL(swBlob);
      navigator.serviceWorker.register(swURL)
        .catch(() => navigator.serviceWorker.register('./sw.js').catch(() => {}));
    } catch(e) {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    }
  }

  // 4. iOS detection — show install option in menu if in Safari and not installed
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent) && !window.MSStream;
  const isStandalone = window.navigator.standalone === true ||
    window.matchMedia('(display-mode: standalone)').matches;
  if (isIOS && !isStandalone) {
    const btn = document.getElementById('menu-install');
    if (btn) btn.style.display = '';
  }
}

function showInstallSheet() {
  const tr = t();
  document.getElementById('ios-install-title').textContent = tr.iosInstallTitle;
  document.getElementById('ios-step1').textContent = tr.iosStep1;
  document.getElementById('ios-step2').textContent = tr.iosStep2;
  document.getElementById('ios-step3').textContent = tr.iosStep3;
  document.getElementById('ios-step4').textContent = tr.iosStep4;
  document.getElementById('ios-note').textContent  = tr.iosNote;
  const svgInner = buildAppIconSVG().replace(/<svg[^>]*>/, '').replace(/<\/svg>/, '');
  const iconEl = document.getElementById('install-app-icon');
  if (iconEl) iconEl.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" style="width:44px;height:44px;display:block">' + svgInner + '</svg>';
  openSheet('sheet-install-ios');
}

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredInstallPrompt = e;
  const btn = document.getElementById('menu-install');
  if (btn) btn.style.display = '';
});

window.addEventListener('appinstalled', () => {
  deferredInstallPrompt = null;
  const btn = document.getElementById('menu-install');
  if (btn) btn.style.display = 'none';
  showToast((isHe() ? '\u05d4\u05d0\u05e4\u05dc\u05d9\u05e7\u05e6\u05d9\u05d4 \u05d4\u05d5\u05ea\u05e7\u05e0\u05d4' : 'App installed') + ' \u2713', 'ok');
});

document.addEventListener('DOMContentLoaded', init);
</script>
