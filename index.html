<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#B8763C"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="משמרות"/>
<title>יומן משמרות</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&display=swap" rel="stylesheet"/>
<style>
/* ── RESET & BASE ── */
*,*::before,*::after{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{height:100%;overscroll-behavior:none;font-family:'Heebo',-apple-system,BlinkMacSystemFont,sans-serif;font-size:16px}
body{padding-top:env(safe-area-inset-top,0px);padding-bottom:env(safe-area-inset-bottom,0px)}
button{font-family:inherit;cursor:pointer;border:none;background:none;outline:none}
input,textarea{font-family:inherit;outline:none;border:none}
textarea{resize:none}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{border-radius:4px}

/* ── RTL TEXT ALIGNMENT — Hebrew always starts from the RIGHT ── */
[dir="rtl"] .text-content,
[dir="rtl"] p,
[dir="rtl"] h1,
[dir="rtl"] h2,
[dir="rtl"] h3,
[dir="rtl"] .day-name,
[dir="rtl"] .shift-label,
[dir="rtl"] .note-text,
[dir="rtl"] .label,
[dir="rtl"] .app-sub,
[dir="rtl"] .section-label {
  text-align: right;
}
[dir="ltr"] .text-content,
[dir="ltr"] p,
[dir="ltr"] h1,
[dir="ltr"] h2,
[dir="ltr"] h3,
[dir="ltr"] .day-name,
[dir="ltr"] .shift-label,
[dir="ltr"] .note-text,
[dir="ltr"] .label,
[dir="ltr"] .app-sub,
[dir="ltr"] .section-label {
  text-align: left;
}

/* ── THEMES ── */
:root{
  --bg:#F7F4EE;--card:#FFF;--border:#E8E2D5;--border-soft:#F1EDE3;
  --text:#1A1A1A;--user-text:#1A1A1A;--mid:#6B655C;--muted:#9E988E;--dim:#B5B0A8;
  --accent:#B8763C;--accent-soft:#FDF6E8;--weekend:#FBF8F1;--hover:#FBF8F1;
  --sheet-bg:#FBF8F1;--primary:#1A1A1A;--primary-text:#FFF;
  --danger:#B85450;--shadow:0 1px 2px rgba(28,28,28,.04);--backdrop:rgba(0,0,0,.3);
  --scrollbar:#E8E2D5;
}
body.dark{
  --bg:#121212;--card:#1E1E1E;--border:#2E2E2E;--border-soft:#262626;
  --text:#ECECEC;--user-text:#FFFFFF;--mid:#A8A8A8;--muted:#7A7A7A;--dim:#555555;
  --accent:#E0A166;--accent-soft:#2A2218;--weekend:#181818;--hover:#262626;
  --sheet-bg:#181818;--primary:#ECECEC;--primary-text:#121212;
  --danger:#E07470;--shadow:0 1px 2px rgba(0,0,0,.4);--backdrop:rgba(0,0,0,.55);
  --scrollbar:#2E2E2E;
}
body{background:var(--bg);color:var(--text);transition:background .22s ease,color .22s ease}
::-webkit-scrollbar-thumb{background:var(--scrollbar)}

/* ── TYPOGRAPHY ── */
.display{font-family:'Fraunces',Georgia,serif;letter-spacing:-.02em}
.tabular{font-variant-numeric:tabular-nums}
.label{font-size:12px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted)}
.section-label{font-size:13px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:8px;display:block}

/* ── LAYOUT ── */
#app{max-width:640px;margin:0 auto;padding-bottom:120px;min-height:100vh}

/* ── PRESS EFFECT ── */
.press{transition:transform .12s ease,background-color .16s ease}
.press:active{transform:scale(.97)}

/* ── ANIMATIONS ── */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes sheetIn{from{opacity:0;transform:translateY(100%)}to{opacity:1;transform:none}}
@keyframes rowIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.fade-in{animation:fadeIn .2s ease both}
.sheet-enter{animation:sheetIn .28s cubic-bezier(.2,.7,.2,1) both}

/* ── HEADER ── */
#header{padding:32px 20px 20px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
#header .left{flex:1;min-width:0}
.app-title{font-size:36px;font-weight:600;line-height:1;color:var(--text)}
.app-sub{font-size:13px;text-transform:uppercase;letter-spacing:.15em;color:var(--muted);margin-top:4px}
.today-date{font-size:15px;color:var(--mid);margin-top:6px}
#menu-btn{width:48px;height:48px;border-radius:50%;background:var(--card);border:1px solid var(--border);
  box-shadow:var(--shadow);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--text)}
#menu-btn svg{width:20px;height:20px}

/* ── BANNER ── */
#banner{margin:0 20px 16px;padding:16px;border-radius:16px;display:none;align-items:flex-start;gap:12px}
#banner.show{display:flex;animation:fadeIn .2s ease both}
#banner{background:linear-gradient(135deg,#B8763C 0%,#A66530 100%);color:#fff}
body.dark #banner{background:linear-gradient(135deg,#E0A166 0%,#B97B3F 100%)}
.banner-icon{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.banner-icon svg{width:18px;height:18px}
.banner-body{flex:1}
.banner-title{font-size:17px;font-weight:500;line-height:1.3;text-align:right}
body:not([dir="rtl"]) .banner-title{text-align:left}
.banner-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.banner-btn-send{background:#fff;color:#A66530;padding:8px 16px;border-radius:999px;font-size:15px;font-weight:500}
body.dark .banner-btn-send{color:#E0A166}
.banner-btn-dismiss{background:rgba(255,255,255,.15);color:#fff;padding:8px 16px;border-radius:999px;font-size:15px}

/* ── MONTH NAV ── */
#month-nav{margin:0 20px 16px;background:var(--card);border:1px solid var(--border);
  box-shadow:var(--shadow);border-radius:16px;padding:4px;display:flex;align-items:center;gap:4px}
.nav-btn{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;color:var(--text)}
.nav-btn:hover{background:var(--hover)}
.nav-btn svg{width:20px;height:20px}
#month-label-btn{flex:1;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;gap:8px;color:var(--text)}
#month-label-btn:hover{background:var(--hover)}
.month-name{font-size:21px;font-weight:500}
.month-year{font-size:21px;font-weight:300;color:var(--muted)}

/* ── SUMMARY CARDS ── */
#summary{margin:0 20px 16px;display:flex;gap:12px}
.summary-card{flex:1;background:var(--card);border:1px solid var(--border);box-shadow:var(--shadow);border-radius:16px;padding:14px 16px}
.summary-card .label{display:block;margin-bottom:4px}
.summary-card .value{font-size:30px;font-weight:600;color:var(--text)}
#jump-today{background:var(--primary);color:var(--primary-text);border-radius:16px;padding:0 16px;
  display:none;flex-direction:column;align-items:center;justify-content:center;gap:4px;min-width:88px}
#jump-today.show{display:flex}
#jump-today svg{width:17px;height:17px}
#jump-today span{font-size:13px;font-weight:500}

/* ── DAY LIST ── */
#day-list{margin:0 20px;background:var(--card);border:1px solid var(--border);box-shadow:var(--shadow);border-radius:16px;overflow:hidden}
.day-row{width:100%;display:flex;align-items:stretch;gap:12px;padding:14px 16px;border:none;
  background:var(--card);text-align:inherit;cursor:pointer;transition:background .15s ease}
.day-row:not(:last-child){border-bottom:1px solid var(--border-soft)}
.day-row.is-today{background:var(--accent-soft)}
.day-row.is-weekend{background:var(--weekend)}
.day-row:hover{background:var(--hover)}
.day-row.is-today:hover{background:var(--accent-soft)}

/* accent stripe */
.day-stripe{width:4px;border-radius:4px;flex-shrink:0;align-self:stretch}

/* date column — "24.4" */
.day-date-col{display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;min-width:64px}
.day-date-num{font-size:28px;font-weight:500;line-height:1;color:var(--text)}
.day-date-num.is-today{color:var(--accent);font-weight:600}

/* content */
.day-content{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center;
  /* CRITICAL RTL FIX: text aligns to the right in Hebrew, left in English */
  text-align: right;
}
[dir="ltr"] .day-content{text-align:left}

.day-name-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  justify-content: flex-end; /* Hebrew: items flush right */
}
[dir="ltr"] .day-name-row{justify-content: flex-start;}

.day-name{font-size:16px;font-weight:500;color:var(--text)}
.today-pill{font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;
  padding:2px 6px;border-radius:4px;background:var(--accent);color:#fff}
.weekend-tag{font-size:14px;color:var(--muted)}
.day-shift-row{margin-top:4px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  justify-content: flex-end; /* Hebrew: shift info flush right */
}
[dir="ltr"] .day-shift-row{justify-content:flex-start;}
.shift-type-label{font-size:17px;font-weight:600}
.shift-times{font-size:17px;font-weight:500;color:var(--user-text);font-variant-numeric:tabular-nums}
.shift-notes{font-size:16px;color:var(--user-text);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.no-shift{margin-top:4px;font-size:14px;color:var(--dim);display:flex;align-items:center;gap:4px;
  justify-content: flex-end; /* Hebrew */
}
[dir="ltr"] .no-shift{justify-content:flex-start;}
.no-shift svg{width:13px;height:13px;flex-shrink:0}

/* ── FOOTER ── */
#footer{text-align:center;font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-top:24px}

/* ── BACKDROP ── */
#backdrop{position:fixed;inset:0;z-index:40;background:var(--backdrop);display:none}
#backdrop.show{display:block;animation:fadeIn .2s ease both}

/* ── BOTTOM SHEET ── */
.sheet{position:fixed;bottom:0;left:0;right:0;z-index:50;background:var(--sheet-bg);
  border-radius:24px 24px 0 0;box-shadow:0 -10px 40px rgba(0,0,0,.2);
  max-height:88vh;display:none;flex-direction:column;
  padding-bottom:env(safe-area-inset-bottom,0px)}
.sheet.show{display:flex;animation:sheetIn .28s cubic-bezier(.2,.7,.2,1) both}
.sheet-handle{width:40px;height:4px;border-radius:4px;background:var(--border);margin:8px auto 0}
.sheet-header{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);flex-shrink:0}
.sheet-title{font-size:24px;font-weight:600;color:var(--text)}
.sheet-close{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--text)}
.sheet-close:hover{background:var(--hover)}
.sheet-close svg{width:20px;height:20px}
.sheet-body{padding:20px;overflow-y:auto;flex:1}

/* ── MENU ITEMS ── */
.menu-item{width:100%;background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;font-size:16px;font-weight:500;color:var(--text);text-align:inherit}
.menu-item svg{width:19px;height:19px;color:var(--mid);flex-shrink:0}
.menu-item .menu-label{flex:1;text-align:right}
[dir="ltr"] .menu-item .menu-label{text-align:left}
.menu-item .menu-value{font-size:14px;font-weight:400;color:var(--muted)}
.menu-item:hover{background:var(--hover)}

/* ── TOGGLE BUTTONS ── */
.toggle-group{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}
.toggle-btn{padding:12px;border-radius:12px;font-size:16px;font-weight:500;border:1px solid var(--border);
  background:var(--card);color:var(--text);display:flex;align-items:center;justify-content:center;gap:8px}
.toggle-btn.active{background:var(--primary);color:var(--primary-text);border-color:var(--primary)}
.toggle-btn svg{width:16px;height:16px}

/* ── SHIFT TYPE GRID ── */
.type-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}
.type-btn{padding:12px;border-radius:12px;font-size:15px;font-weight:500;border:1px solid var(--border);
  background:var(--card);color:var(--text);display:flex;align-items:center;gap:8px;text-align:inherit;cursor:pointer;transition:all .15s ease}
.type-btn.active{border-color:currentColor}
.type-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.type-name{flex:1;text-align:right}
[dir="ltr"] .type-name{text-align:left}
.type-check{width:15px;height:15px;flex-shrink:0}

/* ── TIME SECTION ── */
.time-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.time-col label{display:block;text-align:center;font-size:13px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:8px}
.wheel-picker{background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:6px 4px;display:flex;align-items:center;justify-content:center;gap:4px;direction:ltr}
.wheel-colon{font-size:22px;font-weight:600;color:var(--text);width:14px;text-align:center;flex-shrink:0;font-family:'Fraunces',serif;font-variant-numeric:tabular-nums}
.wheel-col{position:relative;width:68px;height:200px}
.wheel-highlight{position:absolute;top:80px;left:2px;right:2px;height:40px;border-radius:10px;pointer-events:none;z-index:1}
.wheel-fade-top{position:absolute;top:0;left:0;right:0;height:80px;pointer-events:none;z-index:2}
.wheel-fade-bot{position:absolute;bottom:0;left:0;right:0;height:80px;pointer-events:none;z-index:2}
.wheel-scroll{height:100%;overflow-y:auto;overflow-x:hidden;scroll-snap-type:y mandatory;
  -webkit-overflow-scrolling:touch;scrollbar-width:none;touch-action:pan-y}
.wheel-scroll::-webkit-scrollbar{display:none}
.wheel-spacer{height:80px}
.wheel-item{height:40px;scroll-snap-align:center;scroll-snap-stop:always;
  display:flex;align-items:center;justify-content:center;
  font-family:'Fraunces',serif;font-variant-numeric:tabular-nums;
  font-size:17px;font-weight:400;color:var(--muted);opacity:.6;cursor:pointer;
  transition:font-size .16s ease,color .16s ease,opacity .16s ease;user-select:none}
.wheel-item.selected{font-size:22px;font-weight:600;color:var(--text);opacity:1}
.duration-row{display:flex;align-items:center;gap:6px;justify-content:center;font-size:14px;color:var(--mid);margin-top:8px}
.duration-row svg{width:13px;height:13px}
.duration-row strong{color:var(--text);font-variant-numeric:tabular-nums}

/* ── NOTES ── */
.notes-area{width:100%;background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:12px 16px;font-size:16px;color:var(--text);margin-bottom:24px;
  direction:inherit; /* inherits RTL/LTR from parent */
}
.notes-area::placeholder{color:var(--dim)}
.notes-area:focus{border-color:var(--accent)}

/* ── PLACE / WORKPLACE INPUT ── */
.place-row{position:relative;margin-bottom:20px}
.place-icon{position:absolute;top:50%;transform:translateY(-50%);width:18px;height:18px;
  color:var(--accent);pointer-events:none;z-index:1}
[dir="rtl"] .place-icon{right:14px}
[dir="ltr"] .place-icon{left:14px}
.place-input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:13px 16px;font-size:16px;font-weight:500;color:var(--text);
  direction:inherit;outline:none;transition:border-color .15s ease}
[dir="rtl"] .place-input{padding-right:42px}
[dir="ltr"] .place-input{padding-left:42px}
.place-input::placeholder{color:var(--dim);font-weight:400}
.place-input:focus{border-color:var(--accent)}

/* ── PLACE in day list ── */
.shift-place{font-size:15px;color:var(--accent);font-weight:600;display:inline-flex;align-items:center;gap:3px;
  max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.shift-place::before{content:"";display:inline-block;width:4px;height:4px;border-radius:50%;
  background:var(--accent);opacity:.55;flex-shrink:0;margin:0 2px}

/* ── PLACE in voice confirm sheet ── */
.vc-place-row{
  display:flex;align-items:center;gap:10px;
  background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:12px 16px;margin-bottom:12px;
}
.vc-place-icon{width:18px;height:18px;color:var(--accent);flex-shrink:0}
.vc-place-name{font-size:17px;font-weight:600;color:var(--text);flex:1;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── ACTION BUTTONS ── */
.action-row{display:flex;gap:8px}
.btn-save{flex:1;background:var(--primary);color:var(--primary-text);padding:14px;border-radius:12px;
  font-size:17px;font-weight:500;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-save svg{width:18px;height:18px}
.btn-delete{width:56px;background:var(--card);border:1px solid var(--border);border-radius:12px;
  display:flex;align-items:center;justify-content:center;color:var(--danger)}
.btn-delete svg{width:18px;height:18px}
.btn-delete-confirm{padding:12px 16px;background:var(--danger);color:#fff;border-radius:12px;font-size:15px;font-weight:500}

/* ── EMAIL INPUT ── */
.email-input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:12px 16px;font-size:16px;color:var(--text);direction:ltr;margin-bottom:20px}
.email-input:focus{border-color:var(--accent)}

/* ── INSTALL BADGE ── */
.menu-badge{font-size:11px;font-weight:600;background:var(--accent);color:#fff;
  padding:2px 7px;border-radius:99px;letter-spacing:.04em;margin-inline-start:4px}
.menu-value{font-size:13px;color:var(--muted)}

/* ── MONTH GRID ── */
.month-nav-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding:0 4px}
.year-btn{width:40px;height:40px;display:flex;align-items:center;justify-content:center;color:var(--text)}
.year-btn svg{width:18px;height:18px}
.year-display{font-size:24px;font-weight:500;color:var(--text)}
.month-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.month-btn{padding:12px;border-radius:12px;font-size:15px;font-weight:500;
  background:var(--card);border:1px solid var(--border);color:var(--text)}
.month-btn.current-view{background:var(--primary);color:var(--primary-text);border-color:var(--primary)}
.month-btn.current-today{background:var(--accent-soft);color:var(--accent);border-color:rgba(184,118,60,.4)}

/* ── TOAST ── */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:100;
  padding:10px 16px;border-radius:999px;font-size:15px;font-weight:500;pointer-events:none;
  box-shadow:0 4px 20px rgba(0,0,0,.2);display:none;white-space:nowrap}
#toast.show{display:block;animation:fadeIn .2s ease both}
#toast.ok{background:var(--primary);color:var(--primary-text)}
#toast.warn{background:var(--danger);color:#fff}

/* ── SETTINGS NOTIF BTN ── */
.notif-btn{width:100%;background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:12px 16px;display:flex;align-items:center;justify-content:space-between;color:var(--text);margin-bottom:20px}
.notif-btn .notif-left{display:flex;align-items:center;gap:12px;font-size:16px}
.notif-btn svg{width:18px;height:18px;color:var(--mid)}
.notif-btn .chevron{width:18px;height:18px;color:var(--muted)}

/* ══════════════════════════════════════════════
   VOICE / MIC FEATURE
   ══════════════════════════════════════════════ */

/* ── FAB MIC BUTTON ── */
#mic-fab{
  position:fixed;bottom:calc(28px + env(safe-area-inset-bottom,0px));
  left:50%;transform:translateX(-50%);
  z-index:60;
  width:68px;height:68px;border-radius:50%;
  background:linear-gradient(145deg,var(--accent),#96571E);
  color:#fff;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 24px rgba(184,118,60,.45), 0 2px 6px rgba(0,0,0,.2);
  border:3px solid rgba(255,255,255,.15);
  transition:transform .18s cubic-bezier(.2,.7,.2,1), box-shadow .18s ease, background .18s ease;
  cursor:pointer;
}
#mic-fab:active{transform:translateX(-50%) scale(.93)}
#mic-fab.recording{
  background:linear-gradient(145deg,#D94F4F,#B03030);
  box-shadow:0 0 0 0 rgba(217,79,79,.6), 0 6px 24px rgba(217,79,79,.4);
  animation:micPulse 1.4s ease-out infinite;
}
#mic-fab svg{width:28px;height:28px;transition:transform .2s ease}
#mic-fab.recording svg{transform:scale(1.1)}
@keyframes micPulse{
  0%  {box-shadow:0 0 0 0 rgba(217,79,79,.7),0 6px 24px rgba(217,79,79,.4)}
  60% {box-shadow:0 0 0 18px rgba(217,79,79,.0),0 6px 24px rgba(217,79,79,.4)}
  100%{box-shadow:0 0 0 0 rgba(217,79,79,.0),0 6px 24px rgba(217,79,79,.4)}
}

/* ── RECORDING PANEL (slides up from bottom, behind mic) ── */
#voice-panel{
  position:fixed;bottom:0;left:0;right:0;z-index:55;
  background:var(--sheet-bg);
  border-radius:28px 28px 0 0;
  box-shadow:0 -8px 40px rgba(0,0,0,.18);
  padding:0 20px calc(110px + env(safe-area-inset-bottom,0px));
  display:none;
  flex-direction:column;align-items:center;
  border-top:1px solid var(--border);
}
#voice-panel.show{display:flex;animation:sheetIn .3s cubic-bezier(.2,.7,.2,1) both}

.voice-handle{width:40px;height:4px;border-radius:4px;background:var(--border);margin:10px auto 18px}

.voice-status{font-size:15px;font-weight:500;color:var(--muted);margin-bottom:14px;text-align:center;min-height:22px}
.voice-status.active{color:var(--danger);font-weight:600}
.voice-status.done{color:var(--accent);font-weight:600}

/* live waveform canvas */
#voice-wave{
  width:100%;max-width:340px;height:56px;
  border-radius:12px;
  margin-bottom:14px;
}

/* live transcript bubble */
#voice-transcript{
  width:100%;max-width:360px;min-height:44px;
  background:var(--card);border:1px solid var(--border);
  border-radius:14px;padding:10px 14px;
  font-size:16px;color:var(--text);
  text-align:center;line-height:1.5;
  margin-bottom:6px;
  transition:border-color .2s ease;
  direction:auto;
}
#voice-transcript.has-text{border-color:var(--accent)}
#voice-transcript.placeholder{color:var(--dim);font-style:italic}

/* cancel tiny link */
#voice-cancel-btn{font-size:13px;color:var(--muted);text-decoration:underline;margin-top:4px;background:none;border:none;cursor:pointer}

/* ── VOICE CONFIRM SHEET ── */
#sheet-voice-confirm .sheet-body{display:flex;flex-direction:column;gap:0}

.vc-transcript-box{
  background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:12px 16px;margin-bottom:20px;font-size:15px;color:var(--mid);
  line-height:1.6;direction:auto;text-align:center;font-style:italic;
}

.vc-date-row{
  display:flex;align-items:center;justify-content:space-between;
  background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:12px 16px;margin-bottom:12px;
}
.vc-date-label{font-size:13px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted)}
.vc-date-value{font-size:17px;font-weight:600;color:var(--text);font-variant-numeric:tabular-nums}
.vc-date-edit{font-size:13px;color:var(--accent);text-decoration:underline;cursor:pointer;background:none;border:none}

.vc-type-row{
  display:flex;align-items:center;gap:10px;
  background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:12px 16px;margin-bottom:12px;
}
.vc-type-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.vc-type-name{font-size:17px;font-weight:600;flex:1}
.vc-type-times{font-size:15px;color:var(--user-text);font-variant-numeric:tabular-nums}

.vc-notes-row{
  background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:10px 16px;margin-bottom:20px;font-size:15px;color:var(--mid);
  min-height:44px;direction:auto;
}

.vc-warn{
  background:rgba(184,118,60,.1);border:1px solid rgba(184,118,60,.3);
  border-radius:12px;padding:10px 14px;margin-bottom:16px;
  font-size:14px;color:var(--accent);text-align:center;
}
body.dark .vc-warn{background:rgba(224,161,102,.1);border-color:rgba(224,161,102,.3)}

.vc-actions{display:flex;gap:8px;margin-top:4px}
.vc-btn-confirm{
  flex:1;background:var(--primary);color:var(--primary-text);
  padding:14px;border-radius:12px;font-size:17px;font-weight:500;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.vc-btn-confirm svg{width:18px;height:18px}
.vc-btn-edit{
  padding:14px 16px;background:var(--card);border:1px solid var(--border);
  border-radius:12px;font-size:15px;color:var(--text);font-weight:500;
}
.vc-btn-discard{
  padding:14px 16px;background:var(--card);border:1px solid var(--border);
  border-radius:12px;font-size:15px;color:var(--danger);
}

/* no-support banner */
#voice-no-support{
  position:fixed;bottom:calc(110px + env(safe-area-inset-bottom,0px));
  left:50%;transform:translateX(-50%);
  background:var(--danger);color:#fff;border-radius:12px;
  padding:10px 18px;font-size:14px;text-align:center;
  z-index:70;display:none;box-shadow:0 4px 20px rgba(0,0,0,.2);
  white-space:nowrap;
}
#voice-no-support.show{display:block;animation:fadeIn .2s ease both}

/* ── INSTALL BADGE ── */
.menu-badge{font-size:11px;font-weight:600;background:var(--accent);color:#fff;
  padding:2px 7px;border-radius:99px;letter-spacing:.04em;margin-inline-start:4px}
.menu-value{font-size:13px;color:var(--muted)}

/* ── iOS INSTALL SHEET ── */
.install-app-icon{width:80px;height:80px;border-radius:20px;margin:0 auto 24px;
  background:#B8763C;display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 24px rgba(184,118,60,.35)}
body.dark .install-app-icon{background:#C98440;box-shadow:0 4px 24px rgba(224,161,102,.25)}
.install-steps{display:flex;flex-direction:column;gap:16px;margin-bottom:24px}
.install-step{display:flex;align-items:flex-start;gap:14px}
.install-step-num{width:28px;height:28px;min-width:28px;border-radius:50%;background:var(--accent);color:#fff;
  font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px}
.install-step-text{font-size:16px;color:var(--text);line-height:1.5;flex:1}
.install-step-body{flex:1}
.install-step-icon-row{margin-top:8px}
.share-icon-demo{color:var(--accent)}
.install-note{background:var(--accent-soft);border:1px solid rgba(184,118,60,.2);
  border-radius:12px;padding:12px 16px;font-size:14px;color:var(--mid);line-height:1.55;text-align:center}
body.dark .install-note{border-color:rgba(224,161,102,.18)}
</style>
</head>

<div id="app">
  <!-- HEADER -->
  <header id="header">
    <div class="left">
      <h1 class="display app-title">יומן משמרות</h1>
      <div class="app-sub">מעקב יומי</div>
      <div class="today-date tabular" id="header-date"></div>
    </div>
    <button id="menu-btn" class="press" aria-label="תפריט">
      <svg><use href="#ico-menu"/></svg>
    </button>
  </header>

  <!-- NEW-MONTH BANNER -->
  <div id="banner">
    <div class="banner-icon"><svg width="18" height="18"><use href="#ico-bell"/></svg></div>
    <div class="banner-body">
      <div class="banner-title" id="banner-text"></div>
      <div class="banner-actions">
        <button class="banner-btn-send press" id="banner-send"></button>
        <button class="banner-btn-dismiss press" id="banner-dismiss"></button>
      </div>
    </div>
  </div>

  <!-- MONTH NAV -->
  <div id="month-nav">
    <button class="nav-btn press" id="nav-prev" aria-label="prev">
      <svg><use href="#ico-chevron-right"/></svg>
    </button>
    <button id="month-label-btn" class="press">
      <span class="month-name display" id="month-name-label"></span>
      <span class="month-year display tabular" id="month-year-label"></span>
    </button>
    <button class="nav-btn press" id="nav-next" aria-label="next">
      <svg><use href="#ico-chevron-left"/></svg>
    </button>
  </div>

  <!-- SUMMARY -->
  <div id="summary">
    <div class="summary-card">
      <span class="label" id="lbl-total-shifts"></span>
      <div class="value display tabular" id="val-total-shifts">0</div>
    </div>
    <div class="summary-card">
      <span class="label" id="lbl-total-hours"></span>
      <div class="value display tabular" id="val-total-hours">0</div>
    </div>
    <button id="jump-today" class="press">
      <svg width="17" height="17"><use href="#ico-calendar"/></svg>
      <span id="lbl-today"></span>
    </button>
  </div>

  <!-- DAY LIST -->
  <div id="day-list"></div>

  <div id="footer">יומן משמרות · v1.2</div>
</div>

<!-- BACKDROP -->
<div id="backdrop"></div>

<!-- SHEET: EDIT SHIFT -->
<div class="sheet" id="sheet-edit">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <h2 class="sheet-title display" id="edit-title"></h2>
    <button class="sheet-close press" data-close="sheet-edit"><svg><use href="#ico-x"/></svg></button>
  </div>
  <div class="sheet-body">
    <!-- workplace / place -->
    <span class="section-label" id="lbl-place"></span>
    <div class="place-row">
      <svg class="place-icon"><use href="#ico-pin"/></svg>
      <input type="text" class="place-input" id="place-input" placeholder="" maxlength="60"/>
    </div>
    <!-- shift type -->
    <span class="section-label" id="lbl-shift-type"></span>
    <div class="type-grid" id="type-grid"></div>
    <!-- times -->
    <div id="time-section">
      <div class="time-grid">
        <div class="time-col">
          <label id="lbl-start-time"></label>
          <div class="wheel-picker" id="wheel-start"></div>
        </div>
        <div class="time-col">
          <label id="lbl-end-time"></label>
          <div class="wheel-picker" id="wheel-end"></div>
        </div>
      </div>
      <div class="duration-row" id="duration-row">
        <svg><use href="#ico-clock"/></svg>
        <span id="lbl-duration"></span>:
        <strong id="val-duration"></strong>
        <span id="lbl-hours"></span>
      </div>
    </div>
    <!-- notes -->
    <span class="section-label" id="lbl-notes"></span>
    <textarea class="notes-area" id="notes-input" rows="3"></textarea>
    <!-- actions -->
    <div class="action-row">
      <button class="btn-save press" id="btn-save">
        <svg><use href="#ico-check"/></svg>
        <span id="lbl-save"></span>
      </button>
      <button class="btn-delete press" id="btn-delete" style="display:none">
        <svg><use href="#ico-trash"/></svg>
      </button>
      <button class="btn-delete-confirm press" id="btn-delete-confirm" style="display:none">
        <span id="lbl-delete-confirm"></span>
      </button>
    </div>
  </div>
</div>

<!-- SHEET: MENU -->
<div class="sheet" id="sheet-menu">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <h2 class="sheet-title display" id="menu-title"></h2>
    <button class="sheet-close press" data-close="sheet-menu"><svg><use href="#ico-x"/></svg></button>
  </div>
  <div class="sheet-body">
    <button class="menu-item press" id="menu-install" style="display:none">
      <svg><use href="#ico-install"/></svg>
      <span class="menu-label" id="lbl-install"></span>
      <span class="menu-badge" id="badge-install"></span>
    </button>
<button class="menu-item press" id="menu-pdf">
      <svg><use href="#ico-pdf"/></svg>
      <span class="menu-label" id="lbl-pdf"></span>
    </button>
    <button class="menu-item press" id="menu-email">
      <svg><use href="#ico-mail"/></svg>
      <span class="menu-label" id="lbl-email-backup"></span>
    </button>
    <button class="menu-item press" id="menu-theme">
      <svg id="theme-icon"><use href="#ico-moon"/></svg>
      <span class="menu-label" id="lbl-theme-menu"></span>
      <span class="menu-value" id="val-theme-menu"></span>
    </button>
    <button class="menu-item press" id="menu-settings">
      <svg><use href="#ico-settings"/></svg>
      <span class="menu-label" id="lbl-settings"></span>
    </button>
    <button class="menu-item press" id="menu-about">
      <svg><use href="#ico-info"/></svg>
      <span class="menu-label" id="lbl-about"></span>
    </button>
  </div>
</div>

<!-- SHEET: SETTINGS -->
<div class="sheet" id="sheet-settings">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <h2 class="sheet-title display" id="settings-title"></h2>
    <button class="sheet-close press" data-close="sheet-settings"><svg><use href="#ico-x"/></svg></button>
  </div>
  <div class="sheet-body">
    <span class="section-label" id="lbl-theme-sec"></span>
    <div class="toggle-group">
      <button class="toggle-btn press" id="btn-light">
        <svg width="16" height="16"><use href="#ico-sun"/></svg>
        <span id="lbl-light"></span>
      </button>
      <button class="toggle-btn press" id="btn-dark">

};

const SHIFT_TYPES = [
  {id:'morning',  he:'משמרת בוקר',   en:'Morning shift',    color:'#E8A33D'},
  {id:'afternoon',he:'משמרת צהריים', en:'Afternoon shift',  color:'#D97757'},
  {id:'evening',  he:'משמרת ערב',    en:'Evening shift',    color:'#A584CC'},

  {id:'standby',  he:'כוננות',       en:'On-call/standby',  color:'#7FA691'},
  {id:'dayoff',   he:'יום חופש',     en:'Day off',          color:'#A8A39A'},
  {id:'vacation', he:'חופשה',        en:'Vacation',         color:'#6FA06E'},
  {id:'sick',     he:'מחלה',         en:'Sick day',         color:'#CB6E6A'},
  {id:'other',    he:'אחר',          en:'Other',            color:'#8B847A'},
];
const NO_TIMES = new Set(['dayoff','vacation','sick']);

const HE_DAYS = ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
const HE_MON  = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
const EN_DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const EN_MON  = ['January','February','March','April','May','June','July','August','September','October','November','December'];

/* =========================================================================
   STATE
   ========================================================================= */
let lang = 'he', themeMode = 'light', shifts = {}, emailAddr = '', lastNotifiedMonth = null;
let viewYear, viewMonth;
let editDate = null, editDeleteConfirm = false;
let startTime = '09:00', endTime = '18:00';
let pickerStartH, pickerStartM, pickerEndH, pickerEndM;
let pickerYearOffset = 0;

const today = new Date();

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const d = JSON.parse(raw);
      shifts = d.shifts || {};
      lang = d.settings?.language || 'he';
      themeMode = d.settings?.theme || 'light';
      emailAddr = d.settings?.email || '';
      lastNotifiedMonth = d.settings?.lastNotifiedMonth || null;
    }
  } catch(e) {}
}

function save() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      shifts,
      settings: {language:lang, theme:themeMode, email:emailAddr, lastNotifiedMonth}
    }));
  } catch(e) {}
}

/* =========================================================================
   UTILS
   ========================================================================= */
const pad = n => String(n).padStart(2,'0');
const dateKey = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const monthKey = (y,m) => `${y}-${pad(m+1)}`;
const daysInMonth = (y,m) => new Date(y,m+1,0).getDate();
const isSameDay = (a,b) => a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
const shortDate = d => `${d.getDate()}.${d.getMonth()+1}`;
const t = () => TR[lang];
const isHe = () => lang === 'he';
const dayNames = () => isHe() ? HE_DAYS : EN_DAYS;
const monthNames = () => isHe() ? HE_MON : EN_MON;
const getShiftType = id => SHIFT_TYPES.find(s => s.id === id) || SHIFT_TYPES[SHIFT_TYPES.length-1];
const escapeHtml = s => String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

function shiftDuration(start, end) {
  if (!start || !end) return 0;
  const [sh,sm] = start.split(':').map(Number);
  const [eh,em] = end.split(':').map(Number);
  let diff = (eh*60+em) - (sh*60+sm);
  if (diff < 0) diff += 24*60;
  return Math.round(diff/60*100)/100;
}

let toastTimer;
function showToast(msg, kind='ok') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `show ${kind}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className = '', 2400);
}

   THEME & LANGUAGE

}

function applyLang() {
  const dir = isHe() ? 'rtl' : 'ltr';

  document.documentElement.setAttribute('dir', dir);

  document.getElementById('lbl-install').textContent = tr.install;
  document.getElementById('badge-install').textContent = tr.installBadge;
  const installBtn = document.getElementById('menu-install');
  document.getElementById('lbl-email-backup').textContent = tr.emailBackup;
  document.getElementById('lbl-theme-menu').textContent = tr.theme;
  document.getElementById('val-theme-menu').textContent = themeMode === 'dark' ? tr.dark : tr.light;
  document.getElementById('theme-icon').querySelector('use').setAttribute('href', themeMode === 'dark' ? '#ico-sun' : '#ico-moon');
  document.getElementById('lbl-settings').textContent = tr.settings;
  document.getElementById('lbl-about').textContent = tr.about;
  // settings
  document.getElementById('settings-title').textContent = tr.settings;
  document.getElementById('lbl-theme-sec').textContent = tr.theme;
  document.getElementById('lbl-light').textContent = tr.light;

  document.getElementById('btn-dark').classList.toggle('active', themeMode === 'dark');
  document.getElementById('btn-he').classList.toggle('active', lang === 'he');
  document.getElementById('btn-en').classList.toggle('active', lang === 'en');

  document.getElementById('lbl-notif').textContent = tr.notifBlurb;

  document.getElementById('about-title').textContent = tr.about;
  document.getElementById('about-text').textContent = tr.aboutText;
  // months
  document.getElementById('months-title').textContent = tr.allMonths;

/* =========================================================================
   MONTH NAV
   ========================================================================= */
function renderMonthNav() {
  document.getElementById('month-name-label').textContent = monthNames()[viewMonth];
  document.getElementById('month-year-label').textContent = viewYear;
}

function renderSummary() {
  let count = 0, hours = 0;
  const total = daysInMonth(viewYear, viewMonth);
  for (let d = 1; d <= total; d++) {
    const key = dateKey(new Date(viewYear, viewMonth, d));
    const s = shifts[key];
    if (s && s.type && !NO_TIMES.has(s.type)) {
      count++;
      hours += shiftDuration(s.start, s.end);
    }
  }
  document.getElementById('val-total-shifts').textContent = count;
  document.getElementById('val-total-hours').textContent = Math.round(hours*10)/10;

  const sameMonth = viewYear === today.getFullYear() && viewMonth === today.getMonth();
  const jt = document.getElementById('jump-today');
  if (!sameMonth) jt.classList.add('show'); else jt.classList.remove('show');
}

/* =========================================================================
   DAY LIST
   ========================================================================= */
function renderDayList() {
  const list = document.getElementById('day-list');
  list.innerHTML = '';
  const total = daysInMonth(viewYear, viewMonth);
  const tr = t();
  for (let d = 1; d <= total; d++) {
    const date = new Date(viewYear, viewMonth, d);
    const key = dateKey(date);
    const shift = shifts[key];
    const isT = isSameDay(date, today);
    const isWE = date.getDay() === 5 || date.getDay() === 6;
    const st = shift ? getShiftType(shift.type) : null;

    const row = document.createElement('button');
    row.className = 'day-row press' + (isT ? ' is-today' : (isWE && !shift ? ' is-weekend' : ''));
    row.dataset.key = key;

    // content
    let shiftHTML = '';
    if (shift && st) {
      const times = (shift.start && shift.end && !NO_TIMES.has(shift.type))
        ? `<span class="shift-times">${shift.start}–${shift.end}${(() => { const h=shiftDuration(shift.start,shift.end); return h ? ` · ${h}${isHe() ? ' ש׳' : 'h'}` : ''; })()}</span>`
        : '';
      const place = shift.place ? `<span class="shift-place">${escapeHtml(shift.place)}</span>` : '';
      const notes = shift.notes ? `<span class="shift-notes">· ${escapeHtml(shift.notes)}</span>` : '';
      shiftHTML = `<div class="day-shift-row">
        <span class="shift-type-label" style="color:${st.color}">${isHe() ? st.he : st.en}</span>
        ${place}${times}${notes}
      </div>`;
    } else {
      shiftHTML = `<div class="no-shift"><svg width="13" height="13"><use href="#ico-plus"/></svg>${tr.noShift}</div>`;
    }

    const weTag = isWE && !isT ? `<span class="weekend-tag">· ${tr.weekend}</span>` : '';
    const todayPill = isT ? `<span class="today-pill">${tr.today}</span>` : '';

    row.innerHTML = `
      <div class="day-stripe" style="background:${st ? st.color : 'transparent'}"></div>
      <div class="day-date-col">
        <div class="day-date-num display tabular${isT ? ' is-today' : ''}">${shortDate(date)}</div>
      </div>
      <div class="day-content">
        <div class="day-name-row">
          <span class="day-name">${dayNames()[date.getDay()]}</span>
          ${todayPill}${weTag}
        </div>
        ${shiftHTML}
      </div>`;

    row.addEventListener('click', () => openEditSheet(date));
    list.appendChild(row);
  }
}

function renderAll() {
  renderStrings();
  renderMonthNav();
  renderSummary();
  renderDayList();
  renderMonthPicker();
}

/* =========================================================================
   WHEEL PICKER
   ========================================================================= */
function buildWheel(containerId, values, selectedVal, onChange) {
  const container = document.getElementById(containerId);
  container.innerHTML = '';

  const ITEM_H = 40;
  const PAD = 2; // items above/below center

  // hours col
  const hValues = Array.from({length:24}, (_,i) => i);
  const mValues = Array.from({length:60}, (_,i) => i);

  const [initH, initM] = (selectedVal || '09:00').split(':').map(n => Math.min(parseInt(n)||0, 59));

  let curH = initH, curM = initM;

  function makeCol(values, init, onSelect) {
    const wrap = document.createElement('div');
    wrap.className = 'wheel-col';

    // highlight
    const hl = document.createElement('div');
    hl.className = 'wheel-highlight';
    hl.style.background = 'var(--accent)1F';
    wrap.appendChild(hl);

    // fade masks
    const ft = document.createElement('div');
    ft.className = 'wheel-fade-top';
    ft.style.background = 'linear-gradient(to bottom, var(--card) 5%, transparent 100%)';
    wrap.appendChild(ft);

    const fb = document.createElement('div');
    fb.className = 'wheel-fade-bot';
    fb.style.background = 'linear-gradient(to top, var(--card) 5%, transparent 100%)';
    wrap.appendChild(fb);

    // scroll area
    const scroll = document.createElement('div');
    scroll.className = 'wheel-scroll';
    wrap.appendChild(scroll);

    // spacers
    const st = document.createElement('div'); st.className='wheel-spacer'; scroll.appendChild(st);
    const items = [];
    values.forEach((v, i) => {
      const item = document.createElement('div');
      item.className = 'wheel-item' + (v === init ? ' selected' : '');
      item.textContent = pad(v);
      item.dataset.idx = i;
      item.addEventListener('click', () => {
        const target = i * ITEM_H;
        suppress = true;
        scroll.scrollTo({top: target, behavior:'smooth'});
        setTimeout(() => {
          suppress = false;
          onSelect(v);
          updateSelected(v);
        }, 280);
      });
      items.push(item);
      scroll.appendChild(item);
    });
    const sb = document.createElement('div'); sb.className='wheel-spacer'; scroll.appendChild(sb);

    function updateSelected(val) {
      items.forEach(it => it.classList.toggle('selected', parseInt(it.textContent) === val));
    }

    let suppress = false;
    let scrollTimer;

    scroll.addEventListener('scroll', () => {
      if (suppress) return;
      clearTimeout(scrollTimer);
      scrollTimer = setTimeout(() => {
        const rawIdx = scroll.scrollTop / ITEM_H;
        const idx = Math.round(rawIdx);
        const clamped = Math.max(0, Math.min(values.length-1, idx));
        suppress = true;
        scroll.scrollTop = clamped * ITEM_H;
        setTimeout(() => { suppress = false; }, 50);
        const val = values[clamped];
        onSelect(val);
        updateSelected(val);
      }, 120);
    });

    // initial scroll position
    requestAnimationFrame(() => {
      const idx = values.indexOf(init);
      suppress = true;
      scroll.scrollTop = idx * ITEM_H;
      setTimeout(() => { suppress = false; }, 80);
    });

    return wrap;
  }

  // colon
  const colon = document.createElement('div');
  colon.className = 'wheel-colon';
  colon.textContent = ':';

  const colH = makeCol(hValues, curH, v => { curH = v; onChange(`${pad(curH)}:${pad(curM)}`); });
  const colM = makeCol(mValues, curM, v => { curM = v; onChange(`${pad(curH)}:${pad(curM)}`); });

  // ALWAYS ltr for wheel so HH is on left, MM on right — regardless of app language
  container.setAttribute('dir', 'ltr');
  container.appendChild(colH);
  container.appendChild(colon);
  container.appendChild(colM);
}

function openEditSheet(date) {

  const key = dateKey(date);

  // title

  SHIFT_TYPES.forEach(st => {

    btn.addEventListener('click', () => selectType(st.id));

  });

  // time section
  const noTimes = NO_TIMES.has(curType);

  document.getElementById('lbl-shift-type').textContent = tr.shiftType;

  document.getElementById('lbl-end-time').textContent = tr.endTime;
  document.getElementById('lbl-notes').textContent = tr.notes;
  document.getElementById('lbl-save').textContent = tr.save;
  document.getElementById('lbl-duration').textContent = tr.duration;

  document.getElementById('notes-input').value = existing?.notes || '';
  document.getElementById('place-input').placeholder = tr.placePlaceholder;
  document.getElementById('place-input').value = existing?.place || '';

  // build wheel pickers
  buildWheel('wheel-start', null, startTime, v => { startTime = v; updateDuration(); });
  buildWheel('wheel-end',   null, endTime,   v => { endTime   = v; updateDuration(); });

  updateDuration();

  // delete button
  const btnDel = document.getElementById('btn-delete');

  }

  openSheet('sheet-edit');
}

function buildReport(y, m) {
  const tr = t();
  const total = daysInMonth(y, m);
  const mName = monthNames()[m];
  const lines = [`${tr.monthReportTitle} — ${mName} ${y}`, ''];
  let count = 0, hours = 0;
  for (let d = 1; d <= total; d++) {
    const date = new Date(y, m, d);
    const s = shifts[dateKey(date)];
    const dn = dayNames()[date.getDay()];
    if (s) {
      const st = getShiftType(s.type);
      const label = isHe() ? st.he : st.en;
      const place = s.place ? ` · ${s.place}` : '';
      const times = (s.start && s.end) ? ` ${s.start}–${s.end}` : '';
      const notes = s.notes ? ` · ${s.notes}` : '';
      lines.push(`${pad(d)}.${pad(m+1)} (${dn}): ${label}${place}${times}${notes}`);
      if (!NO_TIMES.has(s.type)) { count++; hours += shiftDuration(s.start, s.end); }
    } else {
      lines.push(`${pad(d)}.${pad(m+1)} (${dn}): —`);
    }
  }
  lines.push('', `${tr.totalShifts}: ${count}`, `${tr.totalHours}: ${Math.round(hours*10)/10}`);
  return {title: `${tr.monthReportTitle} — ${mName} ${y}`, body: lines.join('\n'), count, hours: Math.round(hours*10)/10};
}

function renderMonthPicker() {

  grid.innerHTML = '';
  monthNames().forEach((name, idx) => {

/* =========================================================================
   EVENT WIRING
   ========================================================================= */
function wire() {
  // backdrop
  document.getElementById('backdrop').addEventListener('click', closeAllSheets);

  // close buttons
  document.querySelectorAll('[data-close]').forEach(btn => {
    btn.addEventListener('click', () => closeSheet(btn.dataset.close));
  });

  // header menu
  document.getElementById('menu-btn').addEventListener('click', () => {
    renderStrings();
    openSheet('sheet-menu');
  });

  // month nav — RTL: chevron-right = previous month, chevron-left = next month
  document.getElementById('nav-prev').addEventListener('click', () => {
    if (isHe()) { viewMonth++; if (viewMonth>11) { viewMonth=0; viewYear++; } }
    else { viewMonth--; if (viewMonth<0) { viewMonth=11; viewYear--; } }
    renderAll();
  });
  document.getElementById('nav-next').addEventListener('click', () => {
    if (isHe()) { viewMonth--; if (viewMonth<0) { viewMonth=11; viewYear--; } }
    else { viewMonth++; if (viewMonth>11) { viewMonth=0; viewYear++; } }
    renderAll();
  });

  document.getElementById('month-label-btn').addEventListener('click', () => {
    pickerYearOffset = 0;
    renderMonthPicker();
    openSheet('sheet-months');
  });

  // year nav in month picker
  document.getElementById('year-prev').addEventListener('click', () => {
    if (isHe()) pickerYearOffset++; else pickerYearOffset--;
    renderMonthPicker();
  });
  document.getElementById('year-next').addEventListener('click', () => {
    if (isHe()) pickerYearOffset--; else pickerYearOffset++;
    renderMonthPicker();
  });

  // jump to today
  document.getElementById('menu-install').addEventListener('click', () => {
    closeSheet('sheet-menu');
    if (deferredInstallPrompt) {
      deferredInstallPrompt.prompt();
      deferredInstallPrompt.userChoice.then(c => {
        if (c.outcome === 'accepted') {
          deferredInstallPrompt = null;
          document.getElementById('menu-install').style.display = 'none';
        }
      });
    } else {
      showInstallSheet();
    }
  });
  document.getElementById('menu-pdf').addEventListener('click', () => { closeAllSheets(); exportPdf(); });
  document.getElementById('menu-email').addEventListener('click', () => { closeAllSheets(); emailExport(); });
  document.getElementById('menu-theme').addEventListener('click', () => {
    themeMode = themeMode === 'dark' ? 'light' : 'dark';
    applyTheme(); save(); renderStrings();
  });
  document.getElementById('menu-settings').addEventListener('click', () => {
    closeSheet('sheet-menu');
    renderStrings();
    openSheet('sheet-settings');
  });
  document.getElementById('menu-about').addEventListener('click', () => {
    closeSheet('sheet-menu');
    renderStrings();
    openSheet('sheet-about');
  });

  // settings
  document.getElementById('btn-light').addEventListener('click', () => {
    themeMode='light'; applyTheme(); save(); renderStrings();
  });
  document.getElementById('btn-dark').addEventListener('click', () => {
    themeMode='dark'; applyTheme(); save(); renderStrings();
  });
  document.getElementById('btn-he').addEventListener('click', () => {
    lang='he'; applyLang(); save(); renderAll();
  });
  document.getElementById('btn-en').addEventListener('click', () => {
    lang='en'; applyLang(); save(); renderAll();
  });
  document.getElementById('email-input').addEventListener('change', e => {
    emailAddr = e.target.value.trim(); save();
  });
  document.getElementById('btn-notif').addEventListener('click', async () => {
    if (!('Notification' in window)) { showToast('Notifications unavailable','warn'); return; }
    if (Notification.permission === 'granted') { showToast(t().confirm+' ✓','ok'); return; }
    try { const r = await Notification.requestPermission(); if (r==='granted') showToast(t().confirm+' ✓','ok'); } catch {}
  });

  // banner
  document.getElementById('banner-send').addEventListener('click', () => {
    const lm = new Date(); lm.setMonth(lm.getMonth()-1);
    emailExport(lm.getFullYear(), lm.getMonth());
    lastNotifiedMonth = monthKey(today.getFullYear(), today.getMonth());
    save();
    document.getElementById('banner').classList.remove('show');
  });
  document.getElementById('banner-dismiss').addEventListener('click', () => {
    lastNotifiedMonth = monthKey(today.getFullYear(), today.getMonth());
    save();
    document.getElementById('banner').classList.remove('show');
  });

  // edit sheet — save
  document.getElementById('btn-save').addEventListener('click', () => {
    if (!editDate) return;
    const key = dateKey(editDate);
    const type = _currentType || 'morning';
    shifts[key] = {
      type,
      place: document.getElementById('place-input').value.trim().slice(0, 60),
      start: NO_TIMES.has(type) ? '' : startTime,
      end:   NO_TIMES.has(type) ? '' : endTime,
      notes: document.getElementById('notes-input').value.trim(),
      savedAt: new Date().toISOString(),
    };
    save();
    closeSheet('sheet-edit');
    showToast(t().save+' ✓','ok');
    renderDayList(); renderSummary();
  });

  // delete
  document.getElementById('btn-delete').addEventListener('click', () => {
    if (!editDeleteConfirm) {
      editDeleteConfirm = true;
      document.getElementById('btn-delete').style.display = 'none';
      document.getElementById('btn-delete-confirm').style.display = '';
    }
  });
  document.getElementById('btn-delete-confirm').addEventListener('click', () => {
    if (!editDate) return;
    delete shifts[dateKey(editDate)];
    save();
    closeSheet('sheet-edit');
    showToast(t().delete+' ✓','warn');
    renderDayList(); renderSummary();
  });
}

/* =========================================================================
   VOICE ENGINE
   =========================================================================

   Architecture:
   ┌─────────────────────────────────────────────────────┐
   │  Web Speech API (SpeechRecognition)                 │
   │   → live transcript → NLP Parser → parsed object   │
   │   → Confirmation Sheet → save to shifts             │
   └─────────────────────────────────────────────────────┘

   The NLP parser supports Hebrew and English naturally spoken phrases:
   Hebrew examples:
     "משמרת בוקר מחר מ-9 עד 5"
     "ערב שלישי מ-8 עד חצות"
     "יום חופש ב-24 לאפריל"
     "כוננות היום"
   English examples:
     "morning shift tomorrow 9 to 5"
     "night shift on friday from 10 to 6"
     "day off next monday"
     "sick day today"
   ========================================================================= */

/* ── VOICE STATE ── */
let voiceRecognition = null;
let voiceIsRecording = false;
let voiceTranscript  = '';
let voiceAudioCtx    = null;
let voiceAnalyser    = null;
let voiceStream      = null;
let voiceAnimFrame   = null;
let voiceParsed      = null; // { date, type, start, end, notes, raw }

/* ── VOICE STRINGS ── */
const VOICE_TR = {
  he: {
    tapMic:'הקש למשמרת קולית',
    listening:'מקשיב…',
    processing:'מעבד…',
    confirm:'אישור ושמירה',
    editManually:'ערוך ידנית',
    discard:'בטל',
    detected:'זוהה',
    tapToSpeak:'דבר עכשיו',
    partialWarn:'לא זוהו כל הפרטים — בדוק לפני השמירה',
    dateLabel:'תאריך',
    changeDate:'שנה',
    confirmTitle:'אישור משמרת קולית',
    noSupport:'הדפדפן לא תומך בזיהוי קול',
    noMic:'אין גישה למיקרופון',
    nothing:'לא נשמע דבר — נסה שוב',
    cancel:'ביטול',
    today:'היום',
    tomorrow:'מחר',

  },
